---
layout: page
---

{{ content }}
<ul id="archive">
      {% for prj in site.projects %}
      <li class="archiveposturl" style="background: transparent">
            <span><a href="{{ prj.url | prepend: site.baseurl}}">{{ prj.title }}</a></span>
            <strong style="font-size:100%; font-family: 'Titillium Web', sans-serif; float:right">

                  {% if prj.pdf %}
                  <a title="Télécharger l'énoncé (pdf)" href="{{ prj.pdf | prepend: site.baseurl }}"><i
                              class="fas fa-file-pdf"></i></a>
                  {% endif %}                              

                  {% if prj.attachment %}
                  &nbsp; <a title="Télécharger le code de démarrage (zip)"
                        href="{{ prj.attachment | prepend: site.baseurl }}"><i class="fas fa-file-archive"></i></a>
                  {% endif %}

            </strong>
      </li>
      {% endfor %}
</ul>
