# Build settings
markdown: kramdown
kramdown:
   math_engine: mathjax
   syntax_highlighter: rouge

plugins:
  - jemoji

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%d/%m/%Y"
timezone: Africa/Algiers

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    labs:
        output: true
    assignments:
        output: true
    discussions:
        output: true
    quizzes:
        output: true
    projects:
        output: true
    announcements:
        output: false

defaults:
